name: Deploy to GitHub Pages

# 加入並行控制：當有新的推送時，自動取消正在執行中的舊任務，節省資源並避免部署衝突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main # 改為 main 以匹配你目前使用的主要分支名稱

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 強制賦予寫入權限，解決部署時的 403 錯誤
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # 開啟快取，縮短後續下載套件的時間

      - name: Install dependencies
        run: flutter pub get

      - name: Static Analysis
        run: flutter analyze # 在建置前自動檢查程式碼品質

      - name: Build Web Application
        run: |
          # 使用 --base-href 確保在 GitHub Pages 的子路徑下能正確讀取資源
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # 部署建置後的資料夾
          branch: gh-pages # 部署到 gh-pages 分支